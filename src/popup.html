<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tab Heatmap</title>
<link rel="stylesheet" href="popup.css">
</head>
<body data-theme="dark">
  <div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
  </div>
  <header class="topbar">
    <div class="title-wrap">
      <svg class="brand-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3c3.5 3 5 5.6 5 8.4a5 5 0 11-10 0C7 8.6 8.5 6 12 3z"/>
        <path d="M12 17a2.4 2.4 0 002.4-2.4"/>
      </svg>
      <span class="title">Tab Heatmap</span>
    </div>
    <div id="window-scoreboard" class="window-scoreboard hidden" role="group" aria-label="This window's heat scoreboard">
      <span class="ws-stat ws-tabs" title="Tabs in this window">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="6" width="18" height="14" rx="2"/>
          <path d="M3 10h18"/>
          <path d="M8 6V4h4v2"/>
        </svg>
        <span id="ws-tabs-count">0</span>
      </span>
      <span class="ws-stat ws-hot" title="Hot tabs in this window">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3c3 3 5 5.4 5 8.2a5 5 0 11-10 0C7 8.4 9 6 12 3z"/>
          <path d="M12 17a2.2 2.2 0 002.2-2.2"/>
        </svg>
        <span id="ws-hot-count">0</span>
      </span>
      <span class="ws-stat ws-avg" title="Average heat in this window">
        <span class="ws-bar" aria-hidden="true"><span class="ws-bar-fill" id="ws-bar-fill"></span></span>
        <span id="ws-avg-pct">0%</span>
      </span>
      <span class="ws-stat ws-windows hidden" id="ws-windows" title="Other open windows">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="13" height="13" rx="2"/>
          <rect x="8" y="9" width="13" height="11" rx="2"/>
        </svg>
        <span id="ws-windows-count">1</span>
      </span>
    </div>
    <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1.1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.9.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.9V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/>
      </svg>
    </button>
  </header>
  <main id="root" class="content">
    <div class="toolbar" role="toolbar" aria-label="Tab actions">
      <button id="close-idle-btn" class="action-btn" type="button" title="Close tabs idle for more than N days">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 7h16"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M6 7l1 12a2 2 0 002 2h6a2 2 0 002-2l1-12"/>
          <path d="M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/>
        </svg>
        <span class="action-label">Close idle</span>
        <span id="idle-threshold-pill" class="action-pill" aria-label="Idle threshold in days">7d</span>
      </button>
      <button id="copy-cold-btn" class="action-btn action-btn--ghost" type="button" title="Copy URLs of all idle tabs to the clipboard">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="8" y="8" width="12" height="12" rx="2"/>
          <path d="M16 8V6a2 2 0 00-2-2H6a2 2 0 00-2 2v8a2 2 0 002 2h2"/>
        </svg>
        <span class="action-label">Copy cold</span>
        <span id="copy-cold-pill" class="action-pill" aria-label="Idle threshold in days">7d</span>
      </button>
      <button id="suspend-idle-btn" class="action-btn action-btn--ghost" type="button" title="Suspend (discard) idle tabs to free RAM without closing them">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14 4h4a2 2 0 012 2v4"/>
          <path d="M20 14v4a2 2 0 01-2 2h-4"/>
          <path d="M10 20H6a2 2 0 01-2-2v-4"/>
          <path d="M4 10V6a2 2 0 012-2h4"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span class="action-label">Suspend idle</span>
        <span id="suspend-threshold-pill" class="action-pill" aria-label="Idle threshold in days">7d</span>
      </button>
      <label id="group-filter-control" class="sort-control group-filter-control hidden" title="Filter by tab group">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="7" height="7" rx="1.5"/>
          <rect x="14" y="4" width="7" height="7" rx="1.5"/>
          <rect x="3" y="15" width="7" height="5" rx="1.5"/>
          <rect x="14" y="15" width="7" height="5" rx="1.5"/>
        </svg>
        <select id="group-filter-select" class="sort-select" aria-label="Filter by tab group">
          <option value="all">All groups</option>
        </select>
        <span id="group-filter-swatch" class="group-filter-swatch" aria-hidden="true"></span>
        <svg class="sort-caret" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </label>
      <label class="sort-control" title="Sort tabs">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M7 4v16"/>
          <path d="M4 7l3-3 3 3"/>
          <path d="M14 6h7"/>
          <path d="M14 12h5"/>
          <path d="M14 18h3"/>
        </svg>
        <select id="sort-select" class="sort-select" aria-label="Sort tabs">
          <option value="heat">Heat</option>
          <option value="recency">Recency</option>
          <option value="frequency">Frequency</option>
          <option value="alpha">A–Z</option>
        </select>
        <svg class="sort-caret" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </label>
      <button id="select-toggle-btn" class="action-btn action-btn--ghost" type="button" aria-pressed="false" title="Bulk-select tabs">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="4" y="4" width="16" height="16" rx="3"/>
          <path d="M8.5 12.5l2.5 2.5 4.5-5"/>
        </svg>
        <span class="action-label">Select</span>
      </button>
      <button id="close-selected-btn" class="action-btn hidden" type="button" title="Close selected tabs">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 7h16"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M6 7l1 12a2 2 0 002 2h6a2 2 0 002-2l1-12"/>
          <path d="M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/>
        </svg>
        <span class="action-label">Close selected</span>
        <span id="selected-count-pill" class="action-pill" aria-label="Selected tabs">0</span>
      </button>
      <button id="select-all-btn" class="action-btn action-btn--ghost hidden" type="button" title="Select all visible tabs">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 12h12"/>
          <path d="M4 6h16"/>
          <path d="M4 18h8"/>
          <path d="M18 15l2 2 3-3"/>
        </svg>
        <span class="action-label">All</span>
      </button>
      <button id="group-toggle-btn" class="action-btn action-btn--ghost" type="button" aria-pressed="false" title="Group tabs by host">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="5" rx="1.5"/>
          <rect x="3" y="12" width="18" height="3" rx="1"/>
          <rect x="3" y="17" width="18" height="3" rx="1"/>
        </svg>
        <span class="action-label">Group</span>
      </button>
      <button id="jump-hottest-btn" class="action-btn action-btn--ghost" type="button" title="Jump to the hottest tab (Alt+Shift+H)">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3c2 3 4 5 4 8a4 4 0 11-8 0c0-1.5.7-2.6 1.5-3.5C10.3 8 11 7 12 3z"/>
          <path d="M10 16a2 2 0 104 0"/>
        </svg>
        <span class="action-label">Hottest</span>
      </button>
      <button id="export-btn" class="action-btn action-btn--ghost" type="button" title="Export tab snapshot to JSON">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3v12"/>
          <path d="M7 10l5 5 5-5"/>
          <path d="M5 21h14"/>
        </svg>
        <span class="action-label">Export</span>
      </button>
      <button id="import-btn" class="action-btn action-btn--ghost" type="button" title="Restore tab snapshot from JSON">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 21V9"/>
          <path d="M7 14l5-5 5 5"/>
          <path d="M5 3h14"/>
        </svg>
        <span class="action-label">Import</span>
      </button>
      <input id="import-file" type="file" accept="application/json,.json" hidden>
      <button id="save-session-btn" class="action-btn action-btn--ghost" type="button" title="Save every open window and its tabs to a session snapshot">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 4h11l3 3v13a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z"/>
          <path d="M8 4v5h7V4"/>
          <path d="M8 14h8v5H8z"/>
        </svg>
        <span class="action-label">Save session</span>
      </button>
      <button id="restore-session-btn" class="action-btn action-btn--ghost" type="button" title="Reload an entire saved window state (windows, tabs, groups, pins)">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 11a8 8 0 1115 4"/>
          <path d="M4 5v6h6"/>
          <path d="M12 8v5l3 2"/>
        </svg>
        <span class="action-label">Restore session</span>
      </button>
      <input id="restore-session-file" type="file" accept="application/json,.json" hidden>
      <span id="toolbar-status" class="toolbar-status" role="status" aria-live="polite"></span>
    </div>
    <div id="quick-chips" class="quick-chips" role="group" aria-label="Quick actions">
      <button id="chip-close-cold" class="chip chip--danger" type="button" title="Close all cold (idle) tabs">
        <svg class="chip-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 7h14"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M7 7l1 12a2 2 0 002 2h4a2 2 0 002-2l1-12"/>
          <path d="M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/>
        </svg>
        <span class="chip-label">Close cold</span>
        <span class="chip-count" id="chip-close-cold-count" aria-label="Cold tab count">0</span>
      </button>
      <button id="chip-suspend-cold" class="chip chip--neutral" type="button" title="Suspend (discard) all cold tabs">
        <svg class="chip-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14 4h4a2 2 0 012 2v4"/>
          <path d="M20 14v4a2 2 0 01-2 2h-4"/>
          <path d="M10 20H6a2 2 0 01-2-2v-4"/>
          <path d="M4 10V6a2 2 0 012-2h4"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span class="chip-label">Suspend cold</span>
        <span class="chip-count" id="chip-suspend-cold-count" aria-label="Cold tab count">0</span>
      </button>
      <button id="chip-pin-hot" class="chip chip--accent" type="button" title="Pin every hot tab so it survives close-idle sweeps">
        <svg class="chip-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 17v4"/>
          <path d="M9 3h6l-1 5 3 3v3H7v-3l3-3-1-5z"/>
        </svg>
        <span class="chip-label">Pin hot</span>
        <span class="chip-count" id="chip-pin-hot-count" aria-label="Unpinned hot tab count">0</span>
      </button>
    </div>
    <div class="search" role="search">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"/>
        <path d="M20 20l-3.5-3.5"/>
      </svg>
      <input id="search-input" class="search-input" type="search" placeholder="Filter tabs by title or URL" autocomplete="off" spellcheck="false" aria-label="Filter tabs">
      <button id="search-clear" class="search-clear hidden" type="button" aria-label="Clear filter" title="Clear (Esc)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
    </div>
    <div id="heat-histogram" class="heat-histogram hidden" aria-label="Heat distribution across all tabs" role="img">
      <div class="hh-head">
        <span class="hh-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-8"/><path d="M22 20v-5"/>
          </svg>
          <span>Heat distribution</span>
        </span>
        <span class="hh-meta" id="hh-meta"></span>
      </div>
      <div class="hh-bars" id="hh-bars" aria-hidden="true"></div>
      <div class="hh-axis" aria-hidden="true">
        <span>cold</span>
        <span>warm</span>
        <span>hot</span>
      </div>
    </div>
    <div id="heat-minimap" class="heat-minimap hidden" aria-label="Mini-map of all tabs colored by heat" role="group">
      <div class="hm-head">
        <span class="hm-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          <span>Mini-map</span>
        </span>
        <span class="hm-meta" id="hm-meta"></span>
      </div>
      <div class="hm-grid" id="hm-grid" role="list" aria-label="All tabs as a heat grid"></div>
    </div>
    <ul id="tab-list" class="tab-list" aria-live="polite"></ul>
    <div id="no-matches" class="empty empty--compact hidden" aria-hidden="true">
      <svg width="56" height="56" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="54" cy="54" r="28"/>
        <path d="M76 76l18 18"/>
        <path d="M42 54h24" opacity="0.6"/>
      </svg>
      <p class="empty-title">No tabs match</p>
      <p class="empty-sub" id="no-matches-sub">Try a different word.</p>
    </div>
    <div id="empty-state" class="empty hidden" aria-hidden="true">
      <svg width="96" height="96" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="18" y="30" width="84" height="60" rx="10"/>
        <path d="M18 44h84"/>
        <circle cx="28" cy="37" r="1.8"/>
        <circle cx="34" cy="37" r="1.8"/>
        <circle cx="40" cy="37" r="1.8"/>
        <path d="M44 64h32M44 74h22" opacity="0.6"/>
      </svg>
      <p class="empty-title">No tabs to chart</p>
      <p class="empty-sub">Open a few tabs and they'll heat up here.</p>
    </div>
  </main>
  <footer class="footer">
    <span id="stat" class="stat"></span>
    <span class="version">v0.1.0</span>
  </footer>
  <script type="module" src="popup.js"></script>
</body>
</html>
