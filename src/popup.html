<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tab Heatmap</title>
<link rel="stylesheet" href="popup.css">
</head>
<body data-theme="dark">
  <div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
  </div>
  <header class="topbar">
    <div class="title-wrap">
      <svg class="brand-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3c3.5 3 5 5.6 5 8.4a5 5 0 11-10 0C7 8.6 8.5 6 12 3z"/>
        <path d="M12 17a2.4 2.4 0 002.4-2.4"/>
      </svg>
      <span class="title">Tab Heatmap</span>
    </div>
    <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1.1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.9.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.9V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/>
      </svg>
    </button>
  </header>
  <main id="root" class="content">
    <div class="toolbar" role="toolbar" aria-label="Tab actions">
      <button id="close-idle-btn" class="action-btn" type="button" title="Close tabs idle for more than N days">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 7h16"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M6 7l1 12a2 2 0 002 2h6a2 2 0 002-2l1-12"/>
          <path d="M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/>
        </svg>
        <span class="action-label">Close idle</span>
        <span id="idle-threshold-pill" class="action-pill" aria-label="Idle threshold in days">7d</span>
      </button>
      <button id="group-toggle-btn" class="action-btn action-btn--ghost" type="button" aria-pressed="false" title="Group tabs by host">
        <svg class="action-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="5" rx="1.5"/>
          <rect x="3" y="12" width="18" height="3" rx="1"/>
          <rect x="3" y="17" width="18" height="3" rx="1"/>
        </svg>
        <span class="action-label">Group</span>
      </button>
      <span id="toolbar-status" class="toolbar-status" role="status" aria-live="polite"></span>
    </div>
    <ul id="tab-list" class="tab-list" aria-live="polite"></ul>
    <div id="empty-state" class="empty hidden" aria-hidden="true">
      <svg width="96" height="96" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="18" y="30" width="84" height="60" rx="10"/>
        <path d="M18 44h84"/>
        <circle cx="28" cy="37" r="1.8"/>
        <circle cx="34" cy="37" r="1.8"/>
        <circle cx="40" cy="37" r="1.8"/>
        <path d="M44 64h32M44 74h22" opacity="0.6"/>
      </svg>
      <p class="empty-title">No tabs to chart</p>
      <p class="empty-sub">Open a few tabs and they'll heat up here.</p>
    </div>
  </main>
  <footer class="footer">
    <span id="stat" class="stat"></span>
    <span class="version">v0.1.0</span>
  </footer>
  <script type="module" src="popup.js"></script>
</body>
</html>
